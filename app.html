<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hediye Rehberi Uygulama</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #07090E; color: #E2E8F0; font-family: 'Plus Jakarta Sans', sans-serif; }
    #shell { width: min(680px, 100%); padding: 28px; text-align: center; }
    .spinner { width: 56px; height: 56px; border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid #D4AF37; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 24px; }
    .title { font-size: 1.35rem; font-weight: 700; margin-bottom: 12px; }
    .subtitle { color: #94A3B8; margin-bottom: 28px; line-height: 1.75; }
    .button-group { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .button-group button { background: #D4AF37; color: #07090E; border: none; border-radius: 999px; padding: 14px 24px; font-weight: 700; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .button-group button:hover { transform: translateY(-2px); box-shadow: 0 20px 45px rgba(212, 175, 55, 0.25); }
    .error { color: #FCA5A5; margin-top: 20px; }
    .hidden { display: none !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="shell">
    <div id="loader">
      <div class="spinner"></div>
      <div class="title">Uygulama yükleniyor...</div>
      <div class="subtitle">Lütfen bekleyin. Premium hediye deneyimi yalnızca uygulama alanında başlatılacaktır.</div>
      <div class="button-group">
        <button type="button" onclick="backToLanding()">Ana Sayfaya Dön</button>
      </div>
    </div>
    <div id="error" class="hidden error"></div>
  </div>

  <script src="flutter_bootstrap.js" defer></script>
  <script>
    const backToLanding = () => {
      window.location.href = '/';
    };

    const hideLoader = () => {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.style.display = 'none';
      }
    };

    const checkFlutterLoaded = () => {
      const flutterView = document.querySelector('flutter-view');
      return flutterView && flutterView.childElementCount > 0;
    };

    const observeFlutterView = (flutterView) => {
      if (!flutterView) return;
      if (checkFlutterLoaded()) {
        hideLoader();
        return;
      }

      const observer = new MutationObserver(() => {
        if (checkFlutterLoaded()) {
          hideLoader();
          observer.disconnect();
        }
      });

      observer.observe(flutterView, { childList: true, subtree: true });
    };

    const startFlutterObserver = () => {
      const flutterView = document.querySelector('flutter-view');
      if (flutterView) {
        observeFlutterView(flutterView);
        return;
      }

      const bodyObserver = new MutationObserver(() => {
        const flutterViewAgain = document.querySelector('flutter-view');
        if (flutterViewAgain) {
          bodyObserver.disconnect();
          observeFlutterView(flutterViewAgain);
        }
      });
      bodyObserver.observe(document.body, { childList: true, subtree: true });
    };

    const initLoaderWatcher = () => {
      startFlutterObserver();
      setTimeout(() => {
        if (checkFlutterLoaded()) hideLoader();
      }, 2500);
    };

    if (document.readyState !== 'loading') {
      initLoaderWatcher();
    } else {
      window.addEventListener('DOMContentLoaded', initLoaderWatcher);
    }
  </script>
</body>
</html>
