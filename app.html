<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hediye Rehberi Uygulama</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(130deg, #fbf6f1 0%, #f4ebe0 44%, #e9dfd5 100%);
      color: #1f2937;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 8% 14%, rgba(212, 175, 86, 0.14) 0, transparent 10%),
        radial-gradient(circle at 88% 16%, rgba(148, 163, 184, 0.10) 0, transparent 11%),
        radial-gradient(circle at 18% 88%, rgba(251, 207, 232, 0.08) 0, transparent 12%),
        radial-gradient(circle at 80% 88%, rgba(255, 255, 255, 0.06) 0, transparent 16%);
      background-repeat: no-repeat;
      filter: blur(14px);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 10% 12%, rgba(255, 255, 255, 0.18) 1px, transparent 1px),
        radial-gradient(circle at 92% 15%, rgba(255, 255, 255, 0.14) 1px, transparent 1px),
        radial-gradient(circle at 12% 86%, rgba(255, 255, 255, 0.12) 1px, transparent 1px),
        radial-gradient(circle at 88% 84%, rgba(255, 255, 255, 0.10) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.18;
      mix-blend-mode: screen;
      pointer-events: none;
      transform: translateZ(0);
    }

    #loader {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(360px, 90vw);
      padding: 18px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 999px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      z-index: 10;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(31, 41, 55, 0.16);
      border-top: 4px solid #d4af37;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loader-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
    }

    .loader-subtitle {
      font-size: 0.95rem;
      color: #475569;
      text-align: center;
      line-height: 1.5;
      max-width: 300px;
    }

    .hidden {
      display: none !important;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-title">Uygulama yükleniyor</div>
    <div class="loader-subtitle">Lütfen bekleyin, uygulama kısa sürede hazır olacak.</div>
  </div>
  <script src="flutter_bootstrap.js" defer></script>
  <script>
    const backToLanding = () => {
      window.location.href = '/';
    };

    const hideLoader = () => {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.style.display = 'none';
      }
    };

    const checkFlutterLoaded = () => {
      const flutterView = document.querySelector('flutter-view');
      return flutterView && flutterView.childElementCount > 0;
    };

    const observeFlutterView = (flutterView) => {
      if (!flutterView) return;
      if (checkFlutterLoaded()) {
        hideLoader();
        return;
      }

      const observer = new MutationObserver(() => {
        if (checkFlutterLoaded()) {
          hideLoader();
          observer.disconnect();
        }
      });

      observer.observe(flutterView, { childList: true, subtree: true });
    };

    const startFlutterObserver = () => {
      const flutterView = document.querySelector('flutter-view');
      if (flutterView) {
        observeFlutterView(flutterView);
        return;
      }

      const bodyObserver = new MutationObserver(() => {
        const flutterViewAgain = document.querySelector('flutter-view');
        if (flutterViewAgain) {
          bodyObserver.disconnect();
          observeFlutterView(flutterViewAgain);
        }
      });
      bodyObserver.observe(document.body, { childList: true, subtree: true });
    };

    const initLoaderWatcher = () => {
      startFlutterObserver();
      setTimeout(() => {
        if (checkFlutterLoaded()) hideLoader();
      }, 2500);
    };

    if (document.readyState !== 'loading') {
      initLoaderWatcher();
    } else {
      window.addEventListener('DOMContentLoaded', initLoaderWatcher);
    }
  </script>
</body>
</html>
